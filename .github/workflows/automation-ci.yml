name: Selenium Automation CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  schedule:
    - cron: '30 5 * * *'   # Daily at 07:30 SAST (05:30 UTC)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run TestNG tests
        run: mvn clean test

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-artifacts
          path: |
            test-output/
            screenshots/
            logs/
            src/test/resources/extentreports/